name: Daily Data Refresh

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 6 AM EST / 7 AM EDT
  workflow_dispatch:        # allow manual runs

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # ── Run DB scripts inside the Fly container ────────────────────────────
      # DATABASE_URL, SECRET_KEY, and GEMINI_API_KEY are set as Fly secrets
      # and are available inside the container automatically.
      - name: RI — Sync database (last 5 days)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "python3 scripts/import_ri.py --days=5"

      - name: NYC — Daily import (last 3 days)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "python3 scripts/import_nyc.py --days=3"

      - name: Houston — Daily import (last 5 days)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "python3 scripts/import_houston.py --days=5"

      - name: Maricopa — Daily import
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "python3 scripts/import_maricopa.py"

      - name: Generate missing summaries
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "python3 scripts/generate_summaries.py --limit 100"
