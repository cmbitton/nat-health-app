name: Daily Data Refresh

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 4 AM ET
  workflow_dispatch:        # allow manual runs

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── RI: update locations.json ──────────────────────────────────────────
      - name: RI — Refresh locations.json
        env:
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: python3 scripts/refresh.py

      - name: RI — Commit updated locations.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/locations.json
          if git diff --staged --quiet; then
            echo "No changes to locations.json — skipping commit."
          else
            git commit -m "chore: daily locations.json refresh [skip ci]"
            git push
          fi

      # ── RI: sync new inspections into Postgres ─────────────────────────────
      - name: RI — Sync database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY:   ${{ secrets.SECRET_KEY }}
        run: python3 scripts/sync_db.py

      # ── NYC: fetch last 3 days and upsert ─────────────────────────────────
      - name: NYC — Daily import (last 3 days)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY:   ${{ secrets.SECRET_KEY }}
        run: python3 scripts/import_nyc.py --days=3

      # ── AI summaries for new/missing restaurants ──────────────────────────
      - name: AI — Generate missing summaries (cap 30/day)
        env:
          DATABASE_URL:   ${{ secrets.DATABASE_URL }}
          SECRET_KEY:     ${{ secrets.SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/generate_summaries.py --limit 30
