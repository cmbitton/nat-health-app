name: Daily Data Refresh

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 6 AM EST / 7 AM EDT
  workflow_dispatch:        # allow manual runs

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # ── Run all DB scripts in a single SSH connection ──────────────────────
      # DATABASE_URL, SECRET_KEY, and GEMINI_API_KEY are set as Fly secrets
      # and are available inside the container automatically.
      - name: Daily data refresh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "bash -c 'python3 -u scripts/import_ri.py --days=5 && python3 -u scripts/import_nyc.py --days=3 && python3 -u scripts/import_houston.py --days=5 --chunk-days=0 && python3 -u scripts/import_maricopa.py && python3 -u scripts/import_philadelphia.py --days=5 && python3 -u scripts/import_florida.py && python3 -u scripts/generate_summaries.py --limit 5000 && python3 -u scripts/precompute_insights.py'"
