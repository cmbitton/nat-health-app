name: Daily Data Refresh

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = ~4 AM ET
  workflow_dispatch:        # allow manual runs

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh locations.json
        env:
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: python3 scripts/refresh.py

      - name: Commit updated locations.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/locations.json
          if git diff --staged --quiet; then
            echo "No changes to locations.json — skipping commit."
          else
            git commit -m "chore: daily locations.json refresh [skip ci]"
            git push
          fi

      - name: Sync database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python3 scripts/sync_db.py
