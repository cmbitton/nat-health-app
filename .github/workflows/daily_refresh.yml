name: Daily Data Refresh

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 6 AM EST / 7 AM EDT
  workflow_dispatch:        # allow manual runs

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── RI: update locations.json in the runner, commit it back ───────────
      # refresh.py geocodes new locations (needs Google Maps key) and writes
      # data/locations.json. The updated file is committed so the next deploy
      # picks up any new RI locations.
      - name: RI — Refresh locations.json
        env:
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: python3 scripts/refresh.py

      - name: RI — Commit updated locations.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/locations.json
          if git diff --staged --quiet; then
            echo "No changes to locations.json — skipping commit."
          else
            git commit -m "chore: daily locations.json refresh [skip ci]"
            git push
          fi

      # ── Run DB scripts inside the Fly container ────────────────────────────
      # DATABASE_URL, SECRET_KEY, and GEMINI_API_KEY are already set as Fly
      # secrets and are available inside the container automatically.
      - name: RI — Sync database
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "python3 scripts/sync_db.py"

      - name: NYC — Daily import (last 3 days)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "python3 scripts/import_nyc.py --days=3"

      - name: AI — Generate missing summaries
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "python3 scripts/generate_summaries.py --limit 100"
